<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 수집 및 이용 동의서 | BlackRock Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #0a0f1c;
      --card-bg: rgba(20, 28, 48, 0.92);
      --accent-color: #00b4ff;
      --border-color: rgba(0, 180, 255, 0.15);
      --text-main: #f8f9fc;
      --text-sub: #a8b8d8;
      --input-bg: rgba(30, 38, 58, 0.85);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: var(--bg-color);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: linear-gradient(135deg, #0a0f1c 0%, #0f1629 100%);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 40% 20%, rgba(0, 180, 255, 0.12) 0%, transparent 60%);
    }

    .agreement-card {
      width: 100%;
      max-width: 740px;
      background: var(--card-bg);
      backdrop-filter: blur(24px);
      border: 1px solid var(--border-color);
      border-radius: 28px;
      padding: 55px 50px;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.5);
    }

    .top-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .top-brand .brand-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -1.2px;
      color: #ffffff;
      margin-bottom: 6px;
    }
    .top-brand .brand-sub {
      font-size: 13px;
      color: var(--accent-color);
      letter-spacing: 2px;
      font-weight: 500;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }
    .header .top-line {
      width: 48px;
      height: 3px;
      background: linear-gradient(to right, #00b4ff, #0078ff);
      margin: 0 auto 18px;
      border-radius: 10px;
    }
    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-bottom: 45px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 13.8px;
      color: var(--text-sub);
      margin-bottom: 10px;
      font-weight: 500;
    }
    input, select {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 14px;
      padding: 16px 18px;
      color: #fff;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 0 4px rgba(0, 180, 255, 0.18);
    }

    .full-width { grid-column: span 2; }

    .law-box {
      background: rgba(255,255,255,0.04);
      border-radius: 16px;
      padding: 28px;
      font-size: 14.8px;
      color: var(--text-sub);
      line-height: 1.78;
      margin-bottom: 45px;
      border-left: 4px solid var(--accent-color);
    }

    .date-selection {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 14px;
      margin-bottom: 50px;
      font-size: 18.5px;
      font-weight: 600;
    }
    .date-selection select {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent-color);
      color: #fff;
      font-size: 19px;
      font-weight: 700;
      padding: 6px 10px;
    }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #00b4ff, #0088ff);
      color: #fff;
      border: none;
      padding: 21px;
      border-radius: 18px;
      font-size: 18.5px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 15px 40px rgba(0, 180, 255, 0.35);
    }
    .btn-submit:hover {
      transform: translateY(-4px);
      box-shadow: 0 25px 55px rgba(0, 180, 255, 0.5);
    }

    .company-footer {
      margin-top: 60px;
      text-align: center;
      font-size: 14px;
      color: #555;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="hero-bg"></div>
  <div class="bg-overlay"></div>

  <div class="agreement-card">
    <div class="top-brand">
      <div class="brand-name">BlackRock Labs</div>
      <div class="brand-sub">ASSET MANAGEMENT</div>
    </div>

    <div class="header">
      <div class="top-line"></div>
      <h1>개인정보 수집 및 이용 동의서</h1>
    </div>

    <form id="agreementForm">
      <div class="form-grid">
        <div class="input-group">
          <label>성명</label>
          <input type="text" placeholder="성함을 입력하세요" required>
        </div>
        <div class="input-group">
          <label>나이</label>
          <select required>
            <option value="">선택하세요</option>
            <option value="20-30">20~30대</option>
            <option value="40-50">40~50대</option>
            <option value="60+">60대 이상</option>
          </select>
        </div>

        <div class="input-group">
          <label>거주지 (도 단위)</label>
          <select required>
            <option value="">선택하세요</option>
            <option value="서울특별시">서울특별시</option>
            <option value="경기도">경기도</option>
            <option value="강원도">강원도</option>
            <option value="충청북도">충청북도</option>
            <option value="충청남도">충청남도</option>
            <option value="전라북도">전라북도</option>
            <option value="전라남도">전라남도</option>
            <option value="경상북도">경상북도</option>
            <option value="경상남도">경상남도</option>
            <option value="제주특별자치도">제주특별자치도</option>
            <option value="부산광역시">부산광역시</option>
            <option value="대구광역시">대구광역시</option>
            <option value="인천광역시">인천광역시</option>
            <option value="광주광역시">광주광역시</option>
            <option value="대전광역시">대전광역시</option>
            <option value="울산광역시">울산광역시</option>
            <option value="세종특별자치시">세종특별자치시</option>
          </select>
        </div>

        <div class="input-group">
          <label>투자 기간</label>
          <select required>
            <option value="">선택하세요</option>
            <option value="1년이하">1년 이하</option>
            <option value="3년이상">3년 이상</option>
            <option value="5년이상">5년 이상</option>
          </select>
        </div>

        <div class="input-group">
          <label>투자 자금</label>
          <select required>
            <option value="">선택하세요</option>
            <option value="2천만원이하">2천만원 이하</option>
            <option value="5천만원이상">5천만원 이상</option>
            <option value="1억원이상">1억원 이상</option>
            <option value="1억5천만원이상">1억 5천만원 이상</option>
          </select>
        </div>

        <div class="input-group full-width">
          <label>보유 종목 (선택사항)</label>
          <input type="text" placeholder="주요 보유 종목을 적어주세요 (예: 삼성전자, NAVER)">
        </div>
      </div>

      <div class="law-box">
        블랙록자산운용은 개인정보 보호법 제30조에 따라 정보 주체(고객)의 개인정보 및 권익을 보호하고, 
        본 동의서를 통해 수집된 개인정보는 블랙록의 개인별 맞춤 투자 플랜에 참고 자료로 등록됨을 안내 드립니다.
      </div>

      <div class="date-selection">
        <span>2026년</span>
        <select id="monthSelect"></select>
        <span>월</span>
        <select id="daySelect"></select>
        <span>일</span>
      </div>

      <button type="submit" class="btn-submit">내용 확인 및 동의 완료</button>
    </form>

    <div class="company-footer">
      BLACKROCK ASSET MANAGEMENT KOREA
    </div>
  </div>

<script>
  const monthSelect = document.getElementById('monthSelect');
  const daySelect = document.getElementById('daySelect');
  const now = new Date();

  for (let m = 1; m <= 12; m++) {
    let opt = document.createElement('option');
    opt.value = m;
    opt.textContent = m;
    if (m === now.getMonth() + 1) opt.selected = true;
    monthSelect.appendChild(opt);
  }

  function updateDays() {
    daySelect.innerHTML = '';
    for (let d = 1; d <= 31; d++) {
      let opt = document.createElement('option');
      opt.value = d;
      opt.textContent = d;
      if (d === now.getDate()) opt.selected = true;
      daySelect.appendChild(opt);
    }
  }
  updateDays();

  document.getElementById('agreementForm').onsubmit = function(e) {
    e.preventDefault();
    alert('동의가 정상적으로 완료되었습니다.\n감사합니다.');
  };
</script>
</body>
</html>
