<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 수집 및 이용 동의서 | BlackRock Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #06080e;
      --card-bg: #0f121d;
      --accent-color: #00b4ff;
      --border-color: #242a38;
      --text-main: #f0f0f0;
      --text-sub: #9eb1cd;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      padding: 40px 20px;
    }

    /* 반응형 컨테이너 */
    .agreement-card {
      width: 100%;
      max-width: 650px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header img {
      height: 40px; /* 로고가 있다면 경로 수정 */
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
    }

    /* 입력 폼 그리드 */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 35px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
    }

    /* 모바일에서는 한 줄로 표시 */
    @media (max-width: 480px) {
      .form-grid { grid-template-columns: 1fr; }
      .agreement-card { padding: 25px 20px; }
    }

    label {
      font-size: 14px;
      color: var(--text-sub);
      margin-bottom: 8px;
    }

    input, select {
      background: #1a1f2e;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 12px 15px;
      color: #fff;
      font-size: 15px;
      transition: border 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--accent-color);
    }

    /* 법적 안내문 영역 */
    .law-box {
      background: #090c15;
      border-radius: 8px;
      padding: 20px;
      font-size: 13.5px;
      color: var(--text-sub);
      line-height: 1.8;
      margin-bottom: 30px;
      border-left: 4px solid var(--accent-color);
    }

    .signature-area {
      text-align: center;
      margin-top: 50px;
    }

    .date {
      font-size: 16px;
      margin-bottom: 30px;
      color: var(--text-main);
    }

    .btn-submit {
      width: 100%;
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 18px;
      border-radius: 10px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s, background 0.3s;
    }

    .btn-submit:hover {
      background: #0099db;
      transform: translateY(-2px);
    }

    .company-footer {
      margin-top: 40px;
      text-align: center;
      font-size: 14px;
      color: #555;
    }
  </style>
</head>
<body>

<div class="agreement-card">
  <div class="header">
    <h1>개인정보 수집 및 이용 동의서</h1>
  </div>

  <form id="agreementForm">
    <div class="form-grid">
      <div class="input-group">
        <label>성명</label>
        <input type="text" placeholder="홍길동" required>
      </div>
      <div class="input-group">
        <label>나이</label>
        <input type="number" placeholder="47" required>
      </div>
      <div class="input-group">
        <label>성별</label>
        <select required>
          <option value="">선택</option>
          <option value="male">남성</option>
          <option value="female">여성</option>
        </select>
      </div>
      <div class="input-group">
        <label>거주지</label>
        <input type="text" placeholder="서울시 강남구" required>
      </div>
      <div class="input-group">
        <label>투자 기간</label>
        <input type="text" placeholder="예: 3년" required>
      </div>
      <div class="input-group">
        <label>투자 자금</label>
        <input type="text" placeholder="예: 5,000만원" required>
      </div>
      <div class="input-group" style="grid-column: span 2;">
        <label>보유 종목</label>
        <input type="text" placeholder="예: 삼성전자, 테슬라 등" style="grid-column: span 2;">
      </div>
    </div>

    <div class="law-box">
      블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주체의 고충을 원활하게 처리하고 있습니다. <br><br>
      본 방침은 관련 법령의 제개정 및 회사의 운용방침에 따라 변경될 수 있으며, 변경시 개인 매니저 및 블랙록 플랫폼 내부에서 확인 가능 합니다.
    </div>

    <div class="signature-area">
      <div class="date" id="currentDate">2026년 04월 08일</div>
      <button type="submit" class="btn-submit">내용에 동의하며 제출하기</button>
    </div>
  </form>

  <div class="company-footer">
    <strong>블랙록자산운용주식회사 (비상장)</strong>
  </div>
</div>

<script>
  // 오늘 날짜 자동 설정
  const d = new Date();
  document.getElementById('currentDate').innerText = 
    `${d.getFullYear()}년 ${String(d.getMonth() + 1).padStart(2, '0')}월 ${String(d.getDate()).padStart(2, '0')}일`;

  document.getElementById('agreementForm').onsubmit = function(e) {
    e.preventDefault();
    alert('동의서가 성공적으로 제출되었습니다.');
  };
</script>

</body>
</html>
