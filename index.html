<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>블랙록 | 개인정보 동의서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --primary-navy: #0d2f52;
      --table-border: #0d2f52;
      --label-bg: #f8fafc;
      --input-height: 52px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Noto Sans KR', sans-serif; background-color: #f2f2f2; padding: 20px 0; display: flex; flex-direction: column; align-items: center; }

    #document-canvas {
      width: 100%; max-width: 650px; background-color: #fff; position: relative; overflow: hidden;
      background-image: url('be.png'); background-size: 100% auto; background-position: top center; background-repeat: no-repeat;
      box-shadow: 0 15px 50px rgba(0,0,0,0.15);
    }

    .content-area { padding: 190px 40px 80px; }
    .doc-title { font-size: 32px; font-weight: 900; color: var(--primary-navy); text-align: center; margin-bottom: 35px; letter-spacing: -1.5px; }

    .data-table { width: 100%; border: 3px solid var(--table-border); background: rgba(255, 255, 255, 0.95); margin-bottom: 30px; }
    .row { display: flex; border-bottom: 1.5px solid var(--table-border); min-height: var(--input-height); }
    .row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 120px; background: var(--label-bg); color: var(--primary-navy); font-weight: 700; font-size: 15px;
      display: flex; align-items: center; justify-content: center; border-right: 1.5px solid var(--table-border);
    }

    .input-box { flex: 1; padding: 0 20px; display: flex; align-items: center; height: var(--input-height); }
    .input-box input, .input-box select, .capture-span {
      width: 100%; border: none; background: transparent; font-size: 17px; outline: none; font-family: inherit;
      color: #1a1a1a; height: 100%; display: flex; align-items: center;
    }

    .legal-notice { font-size: 14px; line-height: 1.8; color: #444; margin-bottom: 40px; word-break: keep-all; }
    .date-wrap { text-align: center; margin-bottom: 40px; font-size: 18px; font-weight: 700; }
    .date-wrap select, .date-span { border: none; border-bottom: 2px solid #333; font-size: 18px; font-weight: 700; background: transparent; margin: 0 5px; }

    .footer-section { text-align: center; margin-bottom: 40px; }
    .company-stamp { font-size: 21px; font-weight: 900; color: var(--primary-navy); margin-bottom: 15px; }
    
    .resp-input-wrap { display: inline-flex; align-items: center; gap: 5px; border-bottom: 1.5px solid #333; width: 200px; padding-bottom: 5px; min-height: 30px; }
    .resp-input-wrap input, .resp-span { border: none; outline: none; font-size: 15px; width: 100%; font-weight: 700; text-align: center; background: transparent; }

    .btn-save-container { width: 100%; max-width: 650px; margin: 20px auto; padding: 0 10px; }
    .btn-save {
      width: 100%; padding: 22px; background: #c2410c; color: white; border: none; font-size: 20px; font-weight: 800;
      border-radius: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div id="document-canvas">
  <div class="content-area">
    <h1 class="doc-title">개인정보 수집 및 이용 동의서</h1>

    <div class="data-table">
      <div class="row"><div class="label">성 명</div><div class="input-box"><input type="text" placeholder="성함"></div></div>
      <div class="row"><div class="label">연 락 처</div><div class="input-box"><input type="tel" placeholder="010-0000-0000"></div></div>
      <div class="row"><div class="label">나 이</div><div class="input-box"><select><option value="">나이대 선택</option><option>20대</option><option>30대</option><option>40대</option><option>50대</option><option>60대 이상</option></select></div></div>
      <div class="row">
        <div class="label">거 주 지</div>
        <div class="input-box">
          <select>
            <option value="">지역 선택 (전국 상세)</option>
            <optgroup label="서울특별시"><option>강남구</option><option>강동구</option><option>강북구</option><option>강서구</option><option>관악구</option><option>광진구</option><option>구로구</option><option>금천구</option><option>노원구</option><option>도봉구</option><option>동대문구</option><option>동작구</option><option>마포구</option><option>서대문구</option><option>서초구</option><option>성동구</option><option>성북구</option><option>송파구</option><option>양천구</option><option>영등포구</option><option>용산구</option><option>은평구</option><option>종로구</option><option>중구</option><option>중랑구</option></optgroup>
            <optgroup label="경기도"><option>수원시</option><option>성남시</option><option>고양시</option><option>용인시</option><option>부천시</option><option>안산시</option><option>안양시</option><option>남양주시</option><option>화성시</option><option>평택시</option><option>의정부시</option><option>시흥시</option><option>파주시</option><option>광명시</option><option>김포시</option><option>군포시</option><option>광주시</option><option>이천시</option><option>양주시</option><option>오산시</option><option>구리시</option><option>안성시</option><option>포천시</option><option>의왕시</option><option>하남시</option><option>여주시</option><option>양평군</option><option>동두천시</option><option>과천시</option><option>가평군</option><option>연천군</option></optgroup>
            <option>그 외 기타 지역</option>
          </select>
        </div>
      </div>
      <div class="row"><div class="label">투자기간</div><div class="input-box"><select><option value="">선택</option><option>1년 미만</option><option>1년~3년</option><option>3년~5년</option><option>5년 이상</option></select></div></div>
      <div class="row"><div class="label">투자금액</div><div class="input-box"><select><option value="">선택</option><option>1천만원 이하</option><option>5천만원 이하</option><option>1억원 이하</option><option>1억원 이상</option></select></div></div>
      <div class="row"><div class="label">보유종목</div><div class="input-box"><input type="text" placeholder="예: 삼성전자"></div></div>
      <div class="row"><div class="label">수익현황</div><div class="input-box"><input type="text" placeholder="예: 수익중"></div></div>
    </div>

    <div class="legal-notice">블랙록자산운용은 개인정보 보호법 제30조에 따라 정보 주체(고객)의 개인정보 및 권익을 보호하고, 
        본 동의서를 통해 수집된 개인정보는 블랙록의 개인별 맞춤 투자 플랜에 참고 자료로 등록됨을 안내 드립니다.</div>

    <div class="date-wrap">2026년 <select id="m"></select>월 <select id="d"></select>일</div>

    <div class="footer-section">
      <div class="company-stamp">블랙록자산운용주식회사 (비상장)</div>
      <div class="resp-input-wrap"><span style="font-size:14px; color:#555;">작성책임자:</span><input type="text" placeholder="성함"></div>
    </div>
  </div>
</div>

<div class="btn-save-container"><button type="button" class="btn-save" onclick="saveAsImage()">동의서 이미지 저장 (캡처)</button></div>

<script>
  // [날짜 로직]
  const ms = document.getElementById('m'), ds = document.getElementById('d'), now = new Date();
  for(let i=1; i<=12; i++) {
    let o = document.createElement('option'); o.value=i; o.text=i;
    if(i===now.getMonth()+1) o.selected=true; ms.appendChild(o);
  }
  function updateDays() {
    ds.innerHTML=""; const last = new Date(2026, ms.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let o = document.createElement('option'); o.value=i; o.text=i;
      if(i===now.getDate()) o.selected=true; ds.appendChild(o);
    }
  }
  ms.onchange = updateDays; updateDays();

  // [📸 이미지 저장 핵심 로직: 전환 -> 캡처 -> 복구]
  async function saveAsImage() {
    const canvasArea = document.getElementById('document-canvas');
    const inputs = canvasArea.querySelectorAll('input, select');
    const placeholders = [];

    // 1️⃣ 캡처 전: 모든 input/select를 span으로 교체
    inputs.forEach(el => {
      const val = el.value || el.placeholder || "";
      const span = document.createElement('span');
      span.className = el.tagName === 'SELECT' ? 'capture-span' : (el.parentElement.className === 'date-wrap' ? 'date-span' : (el.parentElement.className === 'resp-input-wrap' ? 'resp-span' : 'capture-span'));
      span.innerText = val;
      el.style.display = 'none';
      el.parentNode.insertBefore(span, el);
      placeholders.push({ el, span });
    });

    // 2️⃣ 캡처 실행 (고해상도 2배)
    html2canvas(canvasArea, { scale: 2, useCORS: true, backgroundColor: "#ffffff" }).then(canvas => {
      const link = document.createElement('a');
      link.download = '블랙록_동의서_' + new Date().getTime() + '.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.9);
      link.click();

      // 3️⃣ 캡처 후: span 삭제하고 원래 input/select 다시 표시 (원상복구)
      placeholders.forEach(item => {
        item.span.remove();
        item.el.style.display = '';
      });
    });
  }
</script>
</body>
</html>
