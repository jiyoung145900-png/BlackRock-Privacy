<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블랙록 | 개인정보 동의서</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
:root{
  --navy:#0d2f52;
  --gold:#c9a14a;
  --line:#1e3a5f;
}

/* 전체 */
body{
  font-family:'Noto Sans KR',sans-serif;
  background:#e9edf2;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:30px 0;
}

/* 문서 */
#document-canvas{
  width:100%;
  max-width:650px;
  background:#fff;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.2);
  position:relative;
}

/* 상단 헤더 */
.header{
  background:linear-gradient(135deg,#0d2f52,#1e4f85);
  color:#fff;
  padding:30px;
  text-align:center;
  font-weight:900;
  font-size:22px;
  letter-spacing:2px;
}

/* 내용 */
.content{
  padding:40px;
}

.title{
  font-size:28px;
  font-weight:900;
  color:var(--navy);
  text-align:center;
  margin-bottom:30px;
}

/* 테이블 */
.table{
  border:2px solid var(--line);
  border-radius:8px;
  overflow:hidden;
  margin-bottom:25px;
}

.row{
  display:flex;
  border-bottom:1px solid #dbe2ea;
}

.row:last-child{border-bottom:none;}

.label{
  width:120px;
  background:#f4f7fb;
  font-weight:700;
  display:flex;
  align-items:center;
  justify-content:center;
  color:var(--navy);
}

.input{
  flex:1;
  padding:12px;
  display:flex;
  align-items:center;
}

/* 입력 */
input,select{
  width:100%;
  border:none;
  border-bottom:2px solid #ccd5df;
  font-size:15px;
  padding:6px;
  background:transparent;
  outline:none;
}

input:focus,select:focus{
  border-bottom:2px solid var(--navy);
}

/* select 커스텀 */
select{
  appearance:none;
  background:url("data:image/svg+xml;utf8,<svg fill='%230d2f52' height='20' viewBox='0 0 24 24' width='20'><path d='M7 10l5 5 5-5z'/></svg>") no-repeat right;
}

/* 안내문 */
.notice{
  font-size:13px;
  color:#555;
  line-height:1.7;
  margin-bottom:30px;
}

/* 날짜 */
.date-wrap{
  display:flex;
  justify-content:center;
  gap:6px;
  font-weight:700;
  margin-bottom:30px;
}

.date-wrap select{
  width:auto;
  text-align:center;
}

/* 하단 */
.footer{
  text-align:center;
}

.company{
  font-weight:900;
  color:var(--navy);
  margin-bottom:15px;
}

.resp{
  border-bottom:1px solid #333;
  display:inline-flex;
  gap:10px;
  padding-bottom:5px;
}

.resp input{
  border:none;
  text-align:center;
}

/* 버튼 */
.btn{
  width:100%;
  max-width:650px;
  margin-top:20px;
  padding:18px;
  border:none;
  border-radius:10px;
  font-size:17px;
  font-weight:800;
  color:#fff;
  background:linear-gradient(135deg,#c2410c,#ea580c);
  cursor:pointer;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  transition:0.2s;
}

.btn:hover{
  transform:translateY(-2px);
}
</style>
</head>

<body>

<div id="document-canvas">
  <div class="header">BLACKROCK INVESTMENT</div>

  <div class="content">
    <div class="title">개인정보 수집 및 이용 동의서</div>

    <div class="table">
      <div class="row"><div class="label">성명</div><div class="input"><input></div></div>
      <div class="row"><div class="label">연락처</div><div class="input"><input></div></div>

      <div class="row">
        <div class="label">거주지</div>
        <div class="input">
          <select>
            <option>지역 선택</option>
            <option>서울특별시</option>
            <option>부산광역시</option>
            <option>대구광역시</option>
            <option>인천광역시</option>
            <option>광주광역시</option>
            <option>대전광역시</option>
            <option>울산광역시</option>
            <option>세종특별자치시</option>
            <option>경기도</option>
            <option>강원특별자치도</option>
            <option>충청북도</option>
            <option>충청남도</option>
            <option>전라북도</option>
            <option>전라남도</option>
            <option>경상북도</option>
            <option>경상남도</option>
            <option>제주특별자치도</option>
          </select>
        </div>
      </div>

      <div class="row"><div class="label">투자기간</div><div class="input"><select><option>선택</option><option>1년 미만</option><option>1~3년</option><option>3~5년</option></select></div></div>
      <div class="row"><div class="label">투자금액</div><div class="input"><select><option>선택</option><option>1천만원</option><option>5천만원</option><option>1억원</option></select></div></div>
      <div class="row"><div class="label">보유종목</div><div class="input"><input></div></div>
      <div class="row"><div class="label">수익현황</div><div class="input"><input></div></div>
    </div>

    <div class="notice">
      본 동의서는 개인정보 보호법에 따라 고객의 정보를 보호하며 투자 분석 자료로 활용됩니다.
    </div>

    <div class="date-wrap">
      2026년 <select id="m"></select>월 <select id="d"></select>일
    </div>

    <div class="footer">
      <div class="company">블랙록자산운용주식회사</div>
      <div class="resp">
        작성책임자 <input>
      </div>
    </div>
  </div>
</div>

<button class="btn" onclick="save()">이미지 저장</button>

<script>
const m=document.getElementById('m');
const d=document.getElementById('d');
const now=new Date();

for(let i=1;i<=12;i++){
  let o=new Option(i,i);
  if(i===now.getMonth()+1)o.selected=true;
  m.appendChild(o);
}

function update(){
  d.innerHTML="";
  let last=new Date(2026,m.value,0).getDate();
  for(let i=1;i<=last;i++){
    let o=new Option(i,i);
    if(i===now.getDate())o.selected=true;
    d.appendChild(o);
  }
}
m.onchange=update;
update();

function save(){
  html2canvas(document.getElementById("document-canvas"),{scale:2})
  .then(canvas=>{
    let a=document.createElement("a");
    a.href=canvas.toDataURL("image/jpeg",0.95);
    a.download="동의서.jpg";
    a.click();
  });
}
</script>

</body>
</html>
