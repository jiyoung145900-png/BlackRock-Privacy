<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>블랙록 개인정보 동의서 | BlackRock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    /* ✅ 핵심: 이미지 비율 고정 (16:9 비율) */
    :root {
      --img-ratio: calc(650 / 920); /* 이미지 가로/세로 비율 */
      --primary-navy: #0d2f52;
      --navy-dark: #082441;
      --table-border: #0d2f52;
      --gray-bg: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #f0f3f5;
      display: flex;
      justify-content: center;
      min-height: 100vh;
      color: #1a1a1a;
      -webkit-font-smoothing: antialiased;
    }

    /* 🛡️ 문서를 담는 가장 바깥 컨테이너 */
    .document-page {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      background-color: #fff;
      box-shadow: 0 15px 50px rgba(0,0,0,0.15);
      position: relative;
    }

    /* 🖼️ 배경 이미지를 넣으실 컨테이너 (비율 유지) */
    .background-canvas {
      width: 100%;
      height: 0;
      padding-top: calc(100% * calc(920 / 650)); /* 이미지 비율(세로/가로)만큼 높이 확보 */
      background-color: #fff;
      position: relative;
      /* ✅ 사용자가 만드신 배경 이미지 경로를 여기에 넣으세요 */
      background-image: url('배경이미지_경로.jpg'); 
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
    }

    /* 📝 실제 폼 내용이 올라가는 레이어 (이미지 위에 겹침) */
    .content-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      /* ✅ 핵심: 이미지 상하단 무늬 높이에 맞춰 padding을 조절하세요 */
      padding: 190px 40px 60px; /* 상단 패턴 영역 확보 */
      display: flex;
      flex-direction: column;
    }

    .main-title {
      font-size: 32px;
      font-weight: 900;
      color: var(--primary-navy);
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: -1.5px;
    }

    /* 📊 테이블 디자인: 더 세밀하고 전문적으로 */
    .info-table {
      width: 100%;
      border-top: 3px solid var(--primary-navy);
      border-bottom: 3px solid var(--primary-navy);
      background: rgba(255, 255, 255, 0.95); /* 배경 이미지 투과 대비 */
      margin-bottom: 35px;
    }

    .info-row {
      display: flex;
      border-bottom: 1.5px solid #ccc;
      min-height: 58px;
    }

    .info-row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 120px;
      background: var(--gray-bg);
      color: var(--primary-navy);
      font-weight: 700;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid #ccc;
      text-align: center;
      letter-spacing: 2px;
    }

    .input-box {
      flex: 1;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }

    .input-box input, .input-box select {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      color: #333;
    }

    .input-box input::placeholder { color: #bbb; }

    /* 안내 문구: 가독성 높임 */
    .legal-notice {
      font-size: 14.5px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 45px;
      word-break: keep-all;
    }

    /* 날짜 선택: 중앙 정렬 및 폰트 크기 확대 */
    .date-wrap {
      text-align: center;
      margin-bottom: 45px;
      font-size: 18px;
    }

    .date-wrap select {
      border: none;
      border-bottom: 2px solid #333;
      font-weight: 700;
      font-size: 18px;
      margin: 0 5px;
      text-align: center;
      background: transparent;
    }

    /* 하단 서명란 */
    .signature-area {
      text-align: center;
      margin-bottom: 50px;
    }

    .company-stamp {
      font-size: 20px;
      font-weight: 800;
      color: var(--primary-navy);
      margin-bottom: 15px;
    }

    .resp-line {
      display: inline-block;
      width: 200px;
      text-align: left;
      border-bottom: 1px solid #333;
      font-size: 14px;
      padding-bottom: 5px;
      color: #555;
    }

    /* 버튼: 더 묵직하고 고급스럽게 */
    .submit-btn {
      width: 100%;
      padding: 24px;
      background: var(--primary-navy);
      color: white;
      border: none;
      font-size: 19px;
      font-weight: 700;
      border-radius: 4px;
      cursor: pointer;
      box-shadow: 0 5px 20px rgba(13, 47, 82, 0.2);
    }

    .submit-btn:hover { background: var(--navy-dark); }

    @media (max-width: 480px) {
      .content-overlay { padding-top: 150px; padding-left: 20px; padding-right: 20px; }
      .main-title { font-size: 26px; }
      .label { flex: 0 0 95px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="document-page">
  <div class="background-canvas">
    <div class="content-overlay">
      <h1 class="main-title">블랙록 개인정보 동의서</h1>

      <form id="mainForm">
        <div class="info-table">
          <div class="info-row">
            <div class="label">성 명</div>
            <div class="input-box"><input type="text" placeholder="성함 입력" required></div>
          </div>
          <div class="info-row">
            <div class="label">나 이</div>
            <div class="input-box">
              <select required>
                <option value="">나이대 선택</option>
                <option>20~30대</option><option>40~50대</option><option>60대 이상</option>
              </select>
            </div>
          </div>
          <div class="info-row">
            <div class="label">성 별</div>
            <div class="input-box">
              <select required><option value="">선택</option><option>남성</option><option>여성</option></select>
            </div>
          </div>
          <div class="info-row">
            <div class="label">거 주 지</div>
            <div class="input-box">
              <select required>
                <option value="">지역 선택</option>
                <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
                <option>부산광역시</option><option>대구광역시</option><option>대전광역시</option>
                <option>울산광역시</option><option>광주광역시</option><option>세종특별자치시</option>
                <option>강원도</option><option>충청도</option><option>전라도</option><option>경상도</option><option>제주도</option>
              </select>
            </div>
          </div>
          <div class="info-row">
            <div class="label">투자기간</div>
            <div class="input-box">
              <select required><option value="">기간 선택</option><option>1년 이하</option><option>3년 이상</option><option>5년 이상</option></select>
            </div>
          </div>
          <div class="info-row">
            <div class="label">투자금</div>
            <div class="input-box">
              <select required>
                <option value="">금액 선택</option>
                <option>2천만원 이하</option><option>5천만원 이상</option><option>1억원 이상</option><option>1억 5천만원 이상</option>
              </select>
            </div>
          </div>
          <div class="info-row">
            <div class="label">보유종목</div>
            <div class="input-box"><input type="text" placeholder="ex) 삼성전자, 비트코인"></div>
          </div>
          <div class="info-row">
            <div class="label">수익현황</div>
            <div class="input-box"><input type="text" placeholder="ex) 수익률 등 현황"></div>
          </div>
        </div>

        <div class="legal-notice">
          블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주체의 고충을 원활하게 처리 하고 있습니다.<br><br>
          본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있으며, 변경시 개인매니저 및 블랙록 플랫폼 내부에서 확인 가능 합니다.
        </div>

        <div class="date-wrap">
          <span>2026년</span> <select id="m"></select><span>월</span> <select id="d"></select><span>일</span>
        </div>

        <div class="signature-area">
          <div class="company-stamp">블랙록자산운용주식회사 (비상장)</div>
          <div class="resp-line">작성책임자: </div>
        </div>

        <button type="submit" class="submit-btn">내용 확인 및 동의 완료</button>
      </form>
    </div>
  </div>
</div>

<script>
  // 날짜 생성 로직 복구
  const mS = document.getElementById('m'), dS = document.getElementById('d'), n = new Date();
  for(let i=1; i<=12; i++) {
    let o = document.createElement('option'); o.value=i; o.text=i;
    if(i===n.getMonth()+1) o.selected=true; mS.appendChild(o);
  }
  function uD() {
    dS.innerHTML=""; const last = new Date(2026, mS.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let o = document.createElement('option'); o.value=i; o.text=i;
      if(i===n.getDate()) o.selected=true; dS.appendChild(o);
    }
  }
  mS.onchange = uD; uD();

  // 기존 동의 기능 유지
  document.getElementById('mainForm').onsubmit = (e) => {
    e.preventDefault();
    alert('✓ 개인정보 동의가 정상적으로 완료되었습니다.');
  };
</script>
</body>
</html>
