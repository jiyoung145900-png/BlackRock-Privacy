<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>BlackRock | 개인정보 동의서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <style>
    :root {
      --primary-navy: #0d2f52;
      --border-color: #0d2f52;
      --bg-light: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background-color: #e5e7eb; font-family: 'Noto Sans KR', sans-serif; padding: 20px 0; }

    /* 📄 캡처될 문서 영역 */
    #capture_area {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      background-color: #fff;
      position: relative;
      overflow: hidden;
      /* 사장님이 만드신 배경 이미지 */
      background-image: url('be.png'); 
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
    }

    .content-area {
      padding: 180px 35px 60px; /* 상하단 무늬 공간 확보 */
    }

    .doc-title {
      font-size: 32px; font-weight: 900; color: var(--primary-navy);
      text-align: center; margin-bottom: 30px; letter-spacing: -1.5px;
    }

    /* 📊 테이블 스타일 */
    .data-table {
      width: 100%; border: 2.5px solid var(--border-color);
      margin-bottom: 25px; background: #fff;
    }
    .row { display: flex; border-bottom: 1.2px solid var(--border-color); min-height: 52px; }
    .row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 105px; background: var(--bg-light); color: var(--primary-navy);
      font-weight: 700; font-size: 14px; display: flex; align-items: center;
      justify-content: center; border-right: 1.2px solid var(--border-color);
    }

    .input-box { flex: 1; padding: 0 15px; display: flex; align-items: center; }
    .input-box input, .input-box select {
      width: 100%; border: none; background: transparent; font-size: 16px; 
      outline: none; color: #333; height: 100%;
    }

    /* 법적 고지 */
    .legal-notice {
      font-size: 13.5px; line-height: 1.7; color: #444; 
      margin-bottom: 35px; word-break: keep-all;
    }

    /* 날짜 */
    .date-wrap { text-align: center; margin-bottom: 35px; font-size: 18px; font-weight: 500; }
    .date-wrap select { border: none; border-bottom: 1.5px solid #333; font-size: 18px; font-weight: 700; cursor: pointer; }

    /* 하단 서명 섹션 */
    .footer-section { text-align: center; margin-bottom: 40px; }
    .comp-name { font-size: 21px; font-weight: 900; color: var(--primary-navy); margin-bottom: 15px; }
    
    .manager-input-wrap {
      display: inline-flex; align-items: flex-end; gap: 8px;
      border-bottom: 1.5px solid #000; padding: 0 5px 5px; min-width: 200px;
    }
    .manager-label { font-size: 15px; color: #444; font-weight: 700; }
    .manager-input-wrap input { border: none; outline: none; font-size: 16px; width: 100px; font-weight: 700; }

    /* 💾 저장 버튼 커스텀 */
    .btn-container { max-width: 650px; margin: 20px auto; padding: 0 10px; }
    .btn-save {
      width: 100%; padding: 20px; background: #c2410c; /* 눈에 띄는 저장 색상 */
      color: white; border: none; font-size: 18px; font-weight: 800;
      border-radius: 8px; cursor: pointer; transition: 0.2s;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .btn-save:active { transform: scale(0.98); }
  </style>
</head>
<body>

<div id="capture_area">
  <div class="content-area">
    <h1 class="doc-title">개인정보 수집 및 이용 동의서</h1>

    <div class="data-table">
      <div class="row">
        <div class="label">성 명</div>
        <div class="input-box"><input type="text" placeholder="성함을 적어주세요"></div>
      </div>
      <div class="row">
        <div class="label">나 이</div>
        <div class="input-box">
          <select><option>20~30대</option><option>40~50대</option><option>60대 이상</option></select>
        </div>
      </div>
      <div class="row">
        <div class="label">거 주 지</div>
        <div class="input-box">
          <select>
            <option>서울특별시</option><option>경기도</option><option>인천광역시</option><option>부산광역시</option>
            <option>대구광역시</option><option>대전광역시</option><option>광주광역시</option><option>강원도</option>
            <option>충청도</option><option>전라도</option><option>경상도</option><option>제주도</option>
          </select>
        </div>
      </div>
      <div class="row">
        <div class="label">투자기간</div>
        <div class="input-box">
          <select><option>1년 미만</option><option>1년~3년</option><option>3년~5년</option><option>5년 이상</option></select>
        </div>
      </div>
      <div class="row">
        <div class="label">투자금액</div>
        <div class="input-box">
          <select><option>1천만원 이하</option><option>5천만원 이하</option><option>1억원 이하</option><option>1억원 이상</option></select>
        </div>
      </div>
      <div class="row">
        <div class="label">보유종목</div>
        <div class="input-box"><input type="text" placeholder="ex) 삼성전자, 비트코인 등"></div>
      </div>
      <div class="row">
        <div class="label">수익현황</div>
        <div class="input-box"><input type="text" placeholder="ex) 수익중(+15%), 손실중 등"></div>
      </div>
    </div>

    <div class="legal-notice">
      블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 있습니다.<br><br>
      본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있으며, 플랫폼 내부에서 확인 가능합니다.
    </div>

    <div class="date-wrap">
      2026년 <select id="m"></select>월 <select id="d"></select>일
    </div>

    <div class="footer-section">
      <div class="comp-name">블랙록자산운용주식회사 (비상장)</div>
      <div class="manager-input-wrap">
        <span class="manager-label">작성책임자:</span>
        <input type="text" placeholder="담당자 성함">
      </div>
    </div>
  </div>
</div>
<div class="btn-container">
  <button type="button" class="btn-save" onclick="saveAsImage()">이미지로 저장하기 (캡처)</button>
</div>

<script>
  // 날짜 자동 세팅
  const ms = document.getElementById('m'), ds = document.getElementById('d'), now = new Date();
  for(let i=1; i<=12; i++) {
    let o = document.createElement('option'); o.value=i; o.text=i;
    if(i===now.getMonth()+1) o.selected=true; ms.appendChild(o);
  }
  function updateDays() {
    ds.innerHTML=""; const last = new Date(2026, ms.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let o = document.createElement('option'); o.value=i; o.text=i;
      if(i===now.getDate()) o.selected=true; ds.appendChild(o);
    }
  }
  ms.onchange = updateDays; updateDays();

  // 📸 이미지 저장 핵심 기능
  function saveAsImage() {
    const area = document.getElementById('capture_area');
    html2canvas(area, {
      scale: 2, // 고해상도 (2배)
      useCORS: true, 
      backgroundColor: "#ffffff"
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = '블랙록_동의서_' + new Date().getTime() + '.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.9);
      link.click();
    });
  }
</script>
</body>
</html>
