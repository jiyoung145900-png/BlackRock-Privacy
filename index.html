<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>개인정보 수집 및 이용 동의서 | BlackRock Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #04060a;
      --card-bg: rgba(15, 18, 29, 0.8);
      --accent-color: #00b4ff;
      --border-color: rgba(255, 255, 255, 0.1);
      --text-main: #f0f0f0;
      --text-sub: #9eb1cd;
      --input-bg: rgba(26, 31, 46, 0.7);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      padding: 60px 20px;
      overflow-x: hidden;
    }

    /* --- 하이엔드 배경 시스템 --- */
    .hero-bg {
      position: fixed;
      inset: 0;
      z-index: -1;
      background-image: url('background.jpg');
      background-size: cover;
      background-position: center;
      filter: brightness(0.3) blur(15px);
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at 50% 0%, rgba(0, 180, 255, 0.1) 0%, transparent 70%);
    }

    /* --- 메인 카드 디자인 --- */
    .agreement-card {
      width: 100%;
      max-width: 700px;
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 50px;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), inset 0 0 20px rgba(0, 180, 255, 0.05);
      position: relative;
    }

    .header {
      text-align: center;
      margin-bottom: 50px;
    }

    .header h1 {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
    }

    .header .top-line {
      width: 40px;
      height: 3px;
      background: var(--accent-color);
      margin: 0 auto 20px;
      border-radius: 10px;
    }

    /* --- 입력 폼 그리드 --- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      margin-bottom: 40px;
    }

    .input-group { display: flex; flex-direction: column; }

    @media (max-width: 580px) {
      .form-grid { grid-template-columns: 1fr; }
      .agreement-card { padding: 35px 25px; }
    }

    label {
      font-size: 13px;
      color: var(--text-sub);
      margin-bottom: 10px;
      font-weight: 500;
    }

    input, select {
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 15px;
      color: #fff;
      font-size: 15px;
      transition: all 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent-color);
      box-shadow: 0 0 15px rgba(0, 180, 255, 0.2);
    }

    /* --- 법적 안내문 --- */
    .law-box {
      background: rgba(0, 0, 0, 0.2);
      border-radius: 12px;
      padding: 25px;
      font-size: 14px;
      color: var(--text-sub);
      line-height: 1.8;
      margin-bottom: 40px;
      border-left: 3px solid var(--accent-color);
    }

    /* --- 날짜 선택 영역 (수정 가능하게 변경) --- */
    .date-selection {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
      margin-bottom: 40px;
      color: var(--text-main);
      font-size: 18px;
      font-weight: 600;
    }

    .date-selection select {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--accent-color);
      border-radius: 0;
      padding: 5px 10px;
      font-size: 18px;
      font-weight: 700;
      width: auto;
      text-align: center;
      cursor: pointer;
    }

    /* --- 제출 버튼 --- */
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--accent-color), #0076ff);
      color: #fff;
      border: none;
      padding: 20px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 10px 30px rgba(0, 180, 255, 0.3);
    }

    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 20px 40px rgba(0, 180, 255, 0.5);
    }

    .company-footer {
      margin-top: 50px;
      text-align: center;
      font-size: 14px;
      color: #444;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="hero-bg"></div>
<div class="bg-overlay"></div>

<div class="agreement-card">
  <div class="header">
    <div class="top-line"></div>
    <h1>개인정보 수집 및 이용 동의서</h1>
  </div>

  <form id="agreementForm">
    <div class="form-grid">
      <div class="input-group">
        <label>성명</label>
        <input type="text" placeholder="성함을 입력하세요" required>
      </div>
      <div class="input-group">
        <label>나이</label>
        <input type="number" placeholder="예: 47" required>
      </div>
      <div class="input-group">
        <label>성별</label>
        <select required>
          <option value="male">남성</option>
          <option value="female">여성</option>
        </select>
      </div>
      <div class="input-group">
        <label>거주지</label>
        <input type="text" placeholder="시/군/구 단위" required>
      </div>
      <div class="input-group">
        <label>투자 기간</label>
        <input type="text" placeholder="예: 5년" required>
      </div>
      <div class="input-group">
        <label>투자 자금</label>
        <input type="text" placeholder="예: 1억원" required>
      </div>
      <div class="input-group" style="grid-column: span 2;">
        <label>보유 종목</label>
        <input type="text" placeholder="주요 보유 종목을 적어주세요">
      </div>
    </div>

    <div class="law-box">
      블랙록자산운용은 개인정보보호법에 따라 고객님의 정보를 안전하게 보호합니다. 본 동의서를 통해 수집된 정보는 전문적인 투자 자문 및 서비스 최적화 용도로만 사용됩니다.
    </div>

    <div class="date-selection">
      <span>2026년</span>
      <select id="monthSelect"></select>
      <span>월</span>
      <select id="daySelect"></select>
      <span>일</span>
    </div>

    <button type="submit" class="btn-submit">내용 확인 및 동의 완료</button>
  </form>

  <div class="company-footer">
    BLACKROCK ASSET MANAGEMENT KOREA
  </div>
</div>

<script>
  // 월/일 셀렉트 박스 동적 생성 및 현재 날짜 초기값 세팅
  const monthSelect = document.getElementById('monthSelect');
  const daySelect = document.getElementById('daySelect');
  const now = new Date();

  // 월 생성 (1-12)
  for (let m = 1; m <= 12; m++) {
    let opt = document.createElement('option');
    opt.value = m;
    opt.innerHTML = m;
    if (m === now.getMonth() + 1) opt.selected = true;
    monthSelect.appendChild(opt);
  }

  // 일 생성 (1-31)
  function updateDays() {
    daySelect.innerHTML = '';
    for (let d = 1; d <= 31; d++) {
      let opt = document.createElement('option');
      opt.value = d;
      opt.innerHTML = d;
      if (d === now.getDate()) opt.selected = true;
      daySelect.appendChild(opt);
    }
  }
  updateDays();

  document.getElementById('agreementForm').onsubmit = function(e) {
    e.preventDefault();
    alert('동의가 정상적으로 완료되었습니다.');
  };
</script>

</body>
</html>
