<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>블랙록 개인정보 동의서</title>
  <style>
    :root { --navy: #0d2f52; }
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Noto Sans KR', sans-serif; }
    
    body { background-color: #f2f2f2; display: flex; justify-content: center; }

    .doc-page {
      width: 100%;
      max-width: 650px;
      background-color: #fff;
      position: relative;
      /* 직접 만든 배경 이미지 경로 */
      background-image: url('be.png'); 
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 하단 무늬가 글자를 가리지 않도록 아래 여백(padding-bottom)을 대폭 확보 */
    .form-wrapper {
      padding: 190px 30px 150px; 
      flex: 1;
    }

    .doc-title {
      font-size: 30px; font-weight: 900; color: var(--navy); text-align: center;
      margin-bottom: 35px; letter-spacing: -1px;
    }

    .data-table {
      width: 100%; border: 2.5px solid var(--navy); background: rgba(255, 255, 255, 0.9);
      margin-bottom: 30px;
    }

    .row { display: flex; border-bottom: 1.5px solid var(--navy); min-height: 55px; }
    .row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 110px; background: #f0f3f6; color: var(--navy); font-weight: 700;
      display: flex; align-items: center; justify-content: center; border-right: 1.5px solid var(--navy);
      font-size: 14px;
    }

    .input-box { flex: 1; padding: 5px 15px; display: flex; align-items: center; }
    .input-box input, .input-box select {
      width: 100%; border: none; background: transparent; font-size: 16px; outline: none; color: #333;
    }

    .legal-notice {
      font-size: 14px; line-height: 1.8; color: #333; margin-bottom: 40px; word-break: keep-all;
    }

    .date-selection { text-align: center; margin-bottom: 40px; font-size: 18px; }
    .date-selection select { border: none; border-bottom: 2px solid #333; font-weight: bold; font-size: 18px; margin: 0 5px; }

    .signature-section { text-align: center; margin-bottom: 50px; }
    .company-name { font-size: 19px; font-weight: 800; color: var(--navy); margin-bottom: 15px; }
    .manager-line { display: inline-block; width: 220px; text-align: left; border-bottom: 1px solid #000; font-size: 15px; padding-bottom: 5px; color: #555; }

    .submit-button {
      width: 100%; padding: 22px; background: var(--navy); color: white; border: none;
      font-size: 19px; font-weight: 700; border-radius: 8px; cursor: pointer;
    }

    @media (max-width: 480px) {
      .form-wrapper { padding-top: 160px; padding-bottom: 120px; }
      .label { flex: 0 0 90px; }
    }
  </style>
</head>
<body>

<div class="doc-page">
  <div class="form-wrapper">
    <h1 class="doc-title">블랙록 개인정보 동의서</h1>

    <form id="consentForm">
      <div class="data-table">
        <div class="row">
          <div class="label">성 명</div>
          <div class="input-box"><input type="text" id="name" required></div>
        </div>
        <div class="row">
          <div class="label">나 이</div>
          <div class="input-box">
            <select id="age" required>
              <option value="">나이대 선택</option>
              <option>20~30대</option><option>40~50대</option><option>60대 이상</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="label">성 별</div>
          <div class="input-box">
            <select id="gender" required><option value="">선택</option><option>남성</option><option>여성</option></select>
          </div>
        </div>
        <div class="row">
          <div class="label">거 주 지</div>
          <div class="input-box">
            <select id="address" required>
              <option value="">지역 선택</option>
              <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
              <option>부산광역시</option><option>대구광역시</option><option>대전광역시</option>
              <option>울산광역시</option><option>광주광역시</option><option>세종특별자치시</option>
              <option>강원도</option><option>충청도</option><option>전라도</option><option>경상도</option><option>제주도</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="label">투자기간</div>
          <div class="input-box">
            <select id="duration" required>
              <option value="">선택</option>
              <option>1년 이하</option><option>1년 ~ 3년</option><option>3년 ~ 5년</option><option>5년 이상</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="label">투자금</div>
          <div class="input-box">
            <select id="capital" required>
              <option value="">금액 선택</option>
              <option>1천만원 이하</option><option>3천만원 이하</option><option>5천만원 이하</option>
              <option>1억원 이하</option><option>1억원 이상</option>
            </select>
          </div>
        </div>
        <div class="row">
          <div class="label">보유종목</div>
          <div class="input-box"><input type="text" id="stocks" placeholder="ex) 삼성전자, SK하이닉스, 비트코인 등"></div>
        </div>
        <div class="row">
          <div class="label">수익현황</div>
          <div class="input-box"><input type="text" id="status" placeholder="ex) 수익중(+10%), 손실중(-5%) 등"></div>
        </div>
      </div>

      <div class="legal-notice">
        블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주체의 고충을 원활하게 처리 하고 있습니다.<br><br>
        본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있으며, 변경시 개인매니저 및 블랙록 플랫폼 내부에서 확인 가능 합니다.
      </div>

      <div class="date-selection">
        <span>2026년</span> <select id="m"></select><span>월</span> <select id="d"></select><span>일</span>
      </div>

      <div class="signature-section">
        <div class="company-name">블랙록자산운용주식회사 (비상장)</div>
        <div class="manager-line">작성책임자: </div>
      </div>

      <button type="submit" class="submit-button">내용 확인 및 동의 완료</button>
    </form>
  </div>
</div>

<script>
  // 날짜 선택 기능
  const ms = document.getElementById('m'), ds = document.getElementById('d'), now = new Date();
  for(let i=1; i<=12; i++) {
    let o = document.createElement('option'); o.value=i; o.text=i;
    if(i===now.getMonth()+1) o.selected=true; ms.appendChild(o);
  }
  function updateDays() {
    ds.innerHTML=""; const last = new Date(2026, ms.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let o = document.createElement('option'); o.value=i; o.text=i;
      if(i===now.getDate()) o.selected=true; ds.appendChild(o);
    }
  }
  ms.onchange = updateDays; updateDays();

  // 텔레그램 전송 (기능 복구)
  document.getElementById('consentForm').onsubmit = async (e) => {
    e.preventDefault();
    alert('동의가 정상적으로 처리되었습니다.');
  };
</script>
</body>
</html>
