<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 개인정보 동의서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-point: #0d2f52;
      --table-border: #2c5f8d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      /* 직접 만드신 배경 이미지를 아래 url에 넣으시면 됩니다 */
      background: #f4f7f9 url('본인의_배경이미지_경로.jpg') no-repeat center top;
      background-size: cover;
      display: flex;
      justify-content: center;
      padding: 60px 20px;
    }

    .document-container {
      width: 100%;
      max-width: 800px;
      /* 배경이 비치길 원하시면 background를 투명하게(rgba) 조절하세요 */
      background: rgba(255, 255, 255, 0.95); 
      padding: 60px 50px;
      border-radius: 8px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    }

    .doc-title {
      font-size: 42px;
      font-weight: 900;
      color: var(--navy-point);
      text-align: center;
      margin-bottom: 50px;
      letter-spacing: -1.5px;
    }

    /* 테이블 스타일 */
    .info-table {
      border-top: 2px solid var(--navy-point);
      border-bottom: 2px solid var(--navy-point);
      margin-bottom: 40px;
    }

    .table-row {
      display: flex;
      border-bottom: 1px solid #e1e8ed;
    }
    .table-row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 160px;
      background: #f8fafc;
      padding: 18px 20px;
      font-weight: 700;
      color: #334155;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-right: 1px solid #e1e8ed;
    }

    .input-field {
      flex: 1;
      padding: 10px 20px;
      display: flex;
      align-items: center;
    }

    .input-field input, .input-field select {
      width: 100%;
      height: 40px;
      border: 1px solid #ddd;
      border-radius: 4px;
      padding: 0 12px;
      font-size: 16px;
      font-family: inherit;
      outline-color: var(--table-border);
    }

    .legal-text {
      font-size: 14px;
      line-height: 1.7;
      color: #64748b;
      margin-bottom: 45px;
      word-break: keep-all;
    }

    .date-section {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 50px;
    }
    
    .date-section b { font-weight: 700; color: #000; }

    .footer-signature {
      text-align: center;
      margin-bottom: 40px;
    }
    
    .company-name {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 20px;
    }

    .manager-input-wrap {
      display: inline-block;
      text-align: left;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
    }

    .submit-btn {
      width: 100%;
      padding: 20px;
      background: var(--navy-point);
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div class="document-container">
  <h1 class="doc-title">개인정보 수집 및 이용 동의서</h1>

  <form id="consentForm">
    <div class="info-table">
      <div class="table-row">
        <div class="label"><span>성</span><span>명</span></div>
        <div class="input-field"><input type="text" placeholder="성함을 입력하세요" required></div>
      </div>
      
      <div class="table-row">
        <div class="label"><span>연</span><span>령</span><span>대</span></div>
        <div class="input-field">
          <select required>
            <option value="">선택하세요</option>
            <option>20대</option><option>30대</option><option>40대</option>
            <option>50대</option><option>60대 이상</option>
          </select>
        </div>
      </div>

      <div class="table-row">
        <div class="label"><span>거</span><span>주</span><span>지</span></div>
        <div class="input-field">
          <select required>
            <option value="">지역 선택</option>
            <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
            <option>부산광역시</option><option>대구광역시</option><option>광주광역시</option>
            <option>대전광역시</option><option>울산광역시</option><option>세종특별자치시</option>
            <option>강원도</option><option>충청북도</option><option>충청남도</option>
            <option>전라북도</option><option>전라남도</option><option>경상북도</option>
            <option>경상남도</option><option>제주특별자치도</option>
          </select>
        </div>
      </div>

      <div class="table-row">
        <div class="label"><span>투</span><span>자</span><span>경</span><span>력</span></div>
        <div class="input-field">
          <select required>
            <option value="">선택하세요</option>
            <option>1년 미만</option><option>1년 ~ 3년</option>
            <option>3년 ~ 5년</option><option>5년 이상</option>
          </select>
        </div>
      </div>

      <div class="table-row">
        <div class="label"><span>수</span><span>익</span><span>현</span><span>황</span></div>
        <div class="input-field"><input type="text" placeholder="예: +15% 또는 운용 중"></div>
      </div>
    </div>

    <p class="legal-text">
      본인은 귀사가 본인의 개인정보를 수집·이용하는 것에 동의합니다. 수집된 정보는 목적 외의 용도로 이용되지 않으며, 원치 않을 경우 언제든지 삭제를 요청하실 수 있습니다. 관련 법령에 따라 안전하게 관리될 것임을 약속드립니다.
    </p>

    <div class="date-section">
      2026년 <b id="displayMonth">04</b>월 <b id="displayDay">09</b>일
    </div>

    <div class="footer-signature">
      <div class="company-name">블랙록자산운용주식회사</div>
      <div class="manager-input-wrap">
        작성책임자: <input type="text" style="border:none; outline:none; font-size:16px; width:120px;" placeholder="(인)">
      </div>
    </div>

    <button type="submit" class="submit-btn">동의 및 제출하기</button>
  </form>
</div>

<script>
  // 현재 날짜 자동 세팅
  const now = new Date();
  document.getElementById('displayMonth').innerText = String(now.getMonth() + 1).padStart(2, '0');
  document.getElementById('displayDay').innerText = String(now.getDate()).padStart(2, '0');

  document.getElementById('consentForm').onsubmit = (e) => {
    e.preventDefault();
    alert('정상적으로 접수되었습니다.');
  };
</script>

</body>
</html>
