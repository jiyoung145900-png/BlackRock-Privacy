<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블랙록 개인정보 동의서 | BlackRock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy-primary: #0d2f52;
      --navy-dark: #081e35;
      --blue-medium: #2c5f8d;
      --blue-bright: #4a9fd8;
      --blue-sky: #5dbedc;
      --blue-light: #a8dce8;
      --gray-bg: #e8ecef;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: #f4f7f9;
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .document-container {
      width: 100%;
      max-width: 850px;
      background: white;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      position: relative;
      overflow: hidden; /* 무늬가 밖으로 나가지 않게 */
    }

    /* ============================================
       상단 그래픽 (이미지 완벽 재현)
    ============================================ */
    .top-header {
      position: relative;
      height: 160px;
      background: white;
    }

    /* 배경 파란색 파형 */
    .header-wave {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(100deg, #0d2f52 0%, #1a4a7a 25%, #4a9fd8 60%, #a8dce8 100%);
      clip-path: polygon(0 0, 100% 0, 100% 45%, 85% 100%, 0 100%);
      z-index: 1;
    }

    /* 왼쪽 짙은 삼각형 */
    .header-left-dark {
      position: absolute;
      top: 0; left: 0; width: 35%; height: 100%;
      background: var(--navy-dark);
      clip-path: polygon(0 0, 100% 0, 25% 100%, 0 100%);
      z-index: 2;
    }

    /* 대각선 흰색 선들 */
    .header-lines {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 3;
      pointer-events: none;
    }
    .line {
      position: absolute;
      background: rgba(255,255,255,0.4);
      height: 2px;
      transform: rotate(-25deg);
    }
    .line-main { width: 50%; height: 4px; background: white; top: 45%; right: 5%; }
    .line-sub1 { width: 40%; top: 30%; right: 10%; }
    .line-sub2 { width: 30%; top: 60%; right: 0%; }

    /* 로고 영역 */
    .logo-box {
      position: absolute;
      top: 40%; right: 40px;
      background: var(--blue-sky);
      padding: 10px 35px;
      z-index: 4;
      clip-path: polygon(15% 0, 100% 0, 100% 100%, 0 100%);
    }
    .logo-text {
      color: white;
      font-family: 'Inter', sans-serif;
      font-size: 38px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    /* ============================================
       본문 내용
    ============================================ */
    .content-body { padding: 60px 70px; }

    .doc-title {
      font-size: 52px;
      font-weight: 900;
      color: var(--navy-primary);
      margin-bottom: 45px;
      letter-spacing: -1px;
    }

    .info-table {
      border-top: 3px solid var(--navy-primary);
      border-bottom: 3px solid var(--navy-primary);
      margin-bottom: 35px;
    }

    .table-row {
      display: flex;
      border-bottom: 1.5px solid #ccc;
    }
    .table-row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 180px;
      background: #f0f3f6;
      padding: 18px 25px;
      font-weight: 700;
      color: #333;
      display: flex;
      justify-content: space-between; /* 성 명 : 간격 재현 */
      align-items: center;
      border-right: 1.5px solid var(--navy-primary);
    }

    .input-field {
      flex: 1;
      padding: 12px 25px;
      display: flex;
      align-items: center;
    }
    .input-field input, .input-field select {
      width: 100%;
      border: none;
      outline: none;
      font-size: 16px;
      font-family: inherit;
    }

    .legal-text {
      font-size: 15px;
      line-height: 1.8;
      color: #444;
      margin-bottom: 50px;
    }

    .date-section {
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 60px;
    }
    .date-section select {
      font-size: 20px;
      font-weight: 700;
      border: none;
      border-bottom: 2px solid #333;
      margin: 0 5px;
      cursor: pointer;
    }

    .footer-signature {
      text-align: center;
      margin-bottom: 50px;
    }
    .company-name {
      font-size: 26px;
      font-weight: 800;
      color: #000;
      margin-bottom: 15px;
    }
    .manager-line {
      text-align: left;
      padding-left: 35%;
      font-weight: 700;
      color: #555;
    }

    /* ============================================
       하단 그래픽 (도트 패턴 포함)
    ============================================ */
    .bottom-pattern {
      position: absolute;
      bottom: -20px; right: -20px;
      width: 350px; height: 180px;
      pointer-events: none;
    }
    .bottom-shape-blue {
      position: absolute;
      bottom: 0; right: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, var(--blue-sky) 0%, var(--blue-bright) 100%);
      clip-path: polygon(40% 100%, 100% 0, 100% 100%);
      z-index: 1;
    }
    .bottom-shape-dark {
      position: absolute;
      bottom: 0; right: 0; width: 70%; height: 80%;
      background: var(--navy-dark);
      clip-path: polygon(40% 100%, 100% 10%, 100% 100%);
      z-index: 2;
    }
    .bottom-dots {
      position: absolute;
      bottom: 40px; right: 40px;
      width: 100px; height: 60px;
      background-image: radial-gradient(circle, rgba(255,255,255,0.4) 1.5px, transparent 1.5px);
      background-size: 10px 10px;
      z-index: 3;
    }

    .submit-btn {
      width: 100%;
      padding: 22px;
      background: var(--navy-primary);
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    .submit-btn:hover { background: #000; }
  </style>
</head>
<body>

<div class="document-container">
  <div class="top-header">
    <div class="header-wave"></div>
    <div class="header-left-dark"></div>
    <div class="header-lines">
      <div class="line line-main"></div>
      <div class="line line-sub1"></div>
      <div class="line line-sub2"></div>
    </div>
    <div class="logo-box">
      <div class="logo-text">BlackRock</div>
    </div>
  </div>

  <div class="content-body">
    <h1 class="doc-title">블랙록 개인정보 동의서</h1>

    <form id="consentForm">
      <div class="info-table">
        <div class="table-row">
          <div class="label"><span>성</span><span>명</span><span>:</span></div>
          <div class="input-field"><input type="text" required></div>
        </div>
        <div class="table-row">
          <div class="label"><span>나</span><span>이</span><span>:</span></div>
          <div class="input-field">
            <select required>
              <option value="">선택하세요</option>
              <option>20~30대</option>
              <option>40~50대</option>
              <option>60대 이상</option>
            </select>
          </div>
        </div>
        <div class="table-row">
          <div class="label"><span>성</span><span>별</span><span>:</span></div>
          <div class="input-field">
            <select required>
              <option value="">선택하세요</option>
              <option>남성</option>
              <option>여성</option>
            </select>
          </div>
        </div>
        <div class="table-row">
          <div class="label"><span>거</span><span>주</span><span>지</span><span>:</span></div>
          <div class="input-field">
            <select required>
              <option value="">선택하세요</option>
              <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
              <option>부산광역시</option><option>대구광역시</option><option>대전광역시</option>
              </select>
          </div>
        </div>
        <div class="table-row">
          <div class="label"><span>투</span><span>자</span><span>기</span><span>간</span><span>:</span></div>
          <div class="input-field">
            <select required>
              <option value="">선택하세요</option>
              <option>1년 이하</option><option>3년 이상</option><option>5년 이상</option>
            </select>
          </div>
        </div>
        <div class="table-row">
          <div class="label"><span>투</span><span>자</span><span>금</span><span>:</span></div>
          <div class="input-field">
            <select required>
              <option value="">선택하세요</option>
              <option>2천만원 이하</option><option>5천만원 이상</option><option>1억원 이상</option>
            </select>
          </div>
        </div>
        <div class="table-row">
          <div class="label"><span>보</span><span>유</span><span>종</span><span>목</span><span>:</span></div>
          <div class="input-field"><input type="text"></div>
        </div>
        <div class="table-row">
          <div class="label"><span>수</span><span>익</span><span>현</span><span>황</span><span>:</span></div>
          <div class="input-field"><input type="text"></div>
        </div>
      </div>

      <p class="legal-text">
        블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주제(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주제의 고충을 원활하게 처리 하고 있습니다.<br>
        본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있으며, 변경시 개인매니저 및 블랙록 플랫폼 내부에서 확인 가능 합니다.
      </p>

      <div class="date-section">
        2026년 <select id="month"></select>월 <select id="day"></select>일
      </div>

      <div class="footer-signature">
        <div class="company-name">블랙록자산운용주식회사 (비상장)</div>
        <div class="manager-line">작성책임자:</div>
      </div>

      <button type="submit" class="submit-btn">내용 확인 및 동의 완료</button>
    </form>
  </div>

  <div class="bottom-pattern">
    <div class="bottom-shape-blue"></div>
    <div class="bottom-shape-dark"></div>
    <div class="bottom-dots"></div>
  </div>
</div>

<script>
  // 날짜 로직
  const mSel = document.getElementById('month');
  const dSel = document.getElementById('day');
  const today = new Date();

  for(let i=1; i<=12; i++) {
    let opt = new Option(i, i);
    if(i === today.getMonth()+1) opt.selected = true;
    mSel.add(opt);
  }

  function setDays() {
    dSel.innerHTML = "";
    let last = new Date(2026, mSel.value, 0).getDate();
    for(let i=1; i<=last; i++) {
      let opt = new Option(i, i);
      if(i === today.getDate()) opt.selected = true;
      dSel.add(opt);
    }
  }
  mSel.onchange = setDays;
  setDays();

  document.getElementById('consentForm').onsubmit = (e) => {
    e.preventDefault();
    alert('✓ 동의가 완료되었습니다.');
  };
</script>

</body>
</html>
