<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>블랙록 개인정보 동의서</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #0d2f52;
      --border-color: #0d2f52;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    
    body {
      background-color: #f5f5f5;
      font-family: 'Noto Sans KR', sans-serif;
      display: flex;
      justify-content: center;
    }

    /* 배경 이미지를 넣으실 컨테이너 */
    .doc-page {
      width: 100%;
      max-width: 650px;
      min-height: 100vh;
      background-color: #fff;
      position: relative;
      /* 여기에 이미지를 넣으시면 됩니다 */
      background-image: url('be.png'); 
      background-size: 100% auto;
      background-position: top center;
      background-repeat: no-repeat;
    }

    /* 본문 영역: 이미지 높이에 따라 padding-top을 조절하세요 */
    .form-content {
      padding: 210px 30px 50px; 
    }

    .main-title {
      font-size: 30px;
      font-weight: 900;
      color: var(--navy);
      text-align: center;
      margin-bottom: 35px;
      letter-spacing: -1px;
    }

    /* 테이블 스타일 */
    .info-table {
      width: 100%;
      border: 2.5px solid var(--border-color);
      background: rgba(255, 255, 255, 0.9);
      margin-bottom: 30px;
    }

    .info-row {
      display: flex;
      border-bottom: 1.5px solid var(--border-color);
      min-height: 55px;
    }

    .info-row:last-child { border-bottom: none; }

    .label {
      flex: 0 0 100px;
      background: #f0f3f6;
      color: var(--navy);
      font-weight: 700;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-right: 1.5px solid var(--border-color);
      text-align: center;
    }

    .input-box {
      flex: 1;
      padding: 10px 15px;
      display: flex;
      align-items: center;
    }

    .input-box input, .input-box select {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 16px;
      outline: none;
      font-family: inherit;
      color: #333;
    }

    /* 안내 문구 */
    .legal-notice {
      font-size: 14px;
      line-height: 1.8;
      color: #333;
      margin-bottom: 40px;
      word-break: keep-all;
    }

    /* 날짜 선택 */
    .date-wrap {
      text-align: center;
      margin-bottom: 35px;
      font-size: 18px;
    }

    .date-wrap select {
      border: none;
      border-bottom: 2px solid #333;
      font-weight: 700;
      font-size: 18px;
      margin: 0 5px;
      text-align: center;
    }

    /* 하단 서명 */
    .signature-section {
      text-align: center;
      margin-bottom: 45px;
    }

    .company-title {
      font-size: 19px;
      font-weight: 800;
      color: var(--navy);
      margin-bottom: 15px;
    }

    .manager-field {
      display: inline-block;
      width: 220px;
      text-align: left;
      border-bottom: 1px solid #000;
      font-size: 15px;
      padding-bottom: 5px;
      color: #555;
    }

    /* 버튼 */
    .submit-btn {
      width: 100%;
      padding: 22px;
      background: var(--navy);
      color: white;
      border: none;
      font-size: 18px;
      font-weight: 700;
      border-radius: 6px;
      cursor: pointer;
    }

    @media (max-width: 480px) {
      .form-content { padding-top: 170px; padding-left: 20px; padding-right: 20px; }
      .main-title { font-size: 24px; }
      .label { flex: 0 0 85px; font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="doc-page">
  <div class="form-content">
    <h1 class="main-title">블랙록 개인정보 동의서</h1>

    <form id="mainForm">
      <div class="info-table">
        <div class="info-row">
          <div class="label">성 명</div>
          <div class="input-box"><input type="text" placeholder="성함 입력" required></div>
        </div>
        <div class="info-row">
          <div class="label">나 이</div>
          <div class="input-box">
            <select required>
              <option value="">나이대 선택</option>
              <option>20~30대</option><option>40~50대</option><option>60대 이상</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">성 별</div>
          <div class="input-box">
            <select required>
              <option value="">성별 선택</option>
              <option>남성</option><option>여성</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">거 주 지</div>
          <div class="input-box">
            <select required>
              <option value="">지역 선택</option>
              <option>서울특별시</option><option>경기도</option><option>인천광역시</option>
              <option>부산광역시</option><option>대구광역시</option><option>광주광역시</option>
              <option>대전광역시</option><option>울산광역시</option><option>세종특별자치시</option>
              <option>강원도</option><option>충청도</option><option>전라도</option><option>경상도</option><option>제주도</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">투자기간</div>
          <div class="input-box">
            <select required>
              <option value="">기간 선택</option>
              <option>1년 이하</option><option>3년 이상</option><option>5년 이상</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">투자금</div>
          <div class="input-box">
            <select required>
              <option value="">금액 선택</option>
              <option>2천만원 이하</option><option>5천만원 이상</option>
              <option>1억원 이상</option><option>1억 5천만원 이상</option>
            </select>
          </div>
        </div>
        <div class="info-row">
          <div class="label">보유종목</div>
          <div class="input-box"><input type="text" placeholder="보유 종목명"></div>
        </div>
        <div class="info-row">
          <div class="label">수익현황</div>
          <div class="input-box"><input type="text" placeholder="수익률 등 현황"></div>
        </div>
      </div>

      <div class="legal-notice">
        블랙록자산운용은 개인정보보호법 제 30 조에 따라 정보주체(고객)의 개인정보 보호 및 권익을 보호하고 개인정보와 관련한 정보주체의 고충을 원활하게 처리 하고 있습니다.<br><br>
        본 방침은 관련 법령의 제·개정 및 회사의 운용방침에 따라 변경될 수 있으며, 변경시 개인매니저 및 블랙록 플랫폼 내부에서 확인 가능 합니다.
      </div>

      <div class="date-wrap">
        <span>2026년</span>
        <select id="monthSlot"></select><span>월</span>
        <select id="daySlot"></select><span>일</span>
      </div>

      <div class="signature-section">
        <div class="company-title">블랙록자산운용주식회사 (비상장)</div>
        <div class="manager-field">작성책임자: </div>
      </div>

      <button type="submit" class="submit-btn">내용 확인 및 동의 완료</button>
    </form>
  </div>
</div>

<script>
  const mSelect = document.getElementById('monthSlot');
  const dSelect = document.getElementById('daySlot');
  const today = new Date();

  for(let m=1; m<=12; m++) {
    let opt = document.createElement('option');
    opt.value = m; opt.innerHTML = m;
    if(m === today.getMonth()+1) opt.selected = true;
    mSelect.appendChild(opt);
  }

  function updateDays() {
    dSelect.innerHTML = "";
    const lastDay = new Date(2026, mSelect.value, 0).getDate();
    for(let d=1; d<=lastDay; d++) {
      let opt = document.createElement('option');
      opt.value = d; opt.innerHTML = d;
      if(d === today.getDate()) opt.selected = true;
      dSelect.appendChild(opt);
    }
  }
  mSelect.onchange = updateDays;
  updateDays();

  document.getElementById('mainForm').onsubmit = (e) => {
    e.preventDefault();
    alert('정상적으로 동의되었습니다.');
  };
</script>
</body>
</html>
