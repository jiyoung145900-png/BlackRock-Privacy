<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>블랙록 | 개인정보 동의서</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
:root {
  --primary-navy: #0d2f52;
  --table-border: #0d2f52;
  --label-bg: #f8fafc;
  --input-height: 48px;
}

* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR', sans-serif;
  background:#f2f2f2;
  display:flex;
  flex-direction:column;
  align-items:center;
}

#document-canvas {
  width:100%;
  max-width:650px;
  background:#fff;
  background-image:url('be.png');
  background-size:100% auto;
  background-repeat:no-repeat;
  box-shadow:0 10px 40px rgba(0,0,0,0.2);
}

.content-area { padding:190px 40px 80px; }

.doc-title {
  font-size:32px;
  font-weight:900;
  text-align:center;
  color:var(--primary-navy);
  margin-bottom:30px;
}

.data-table {
  border:3px solid var(--table-border);
}

.row {
  display:flex;
  min-height:var(--input-height);
  border-bottom:1.5px solid var(--table-border);
}

.label {
  width:120px;
  background:var(--label-bg);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
}

.input-box {
  flex:1;
  padding:0 20px;
  display:flex;
  align-items:center;
  height:var(--input-height);
}

.input-box input,
.input-box select {
  width:100%;
  border:none;
  background:transparent;
  font-size:16px;
  height:100%;
  outline:none;
}

.capture-text {
  font-size:16px;
  display:flex;
  align-items:center;
  height:100%;
}

.legal-notice {
  margin-top:20px;
  font-size:14px;
  line-height:1.8;
}

.date-wrap {
  text-align:center;
  margin:40px 0;
}

.footer-section {
  text-align:center;
}

.btn-save {
  width:650px;
  margin-top:20px;
  padding:20px;
  background:#c2410c;
  color:#fff;
  border:none;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<div id="document-canvas">
  <div class="content-area">

    <h1 class="doc-title">개인정보 수집 및 이용 동의서</h1>

    <div class="data-table">

      <div class="row"><div class="label">성명</div><div class="input-box"><input></div></div>
      <div class="row"><div class="label">연락처</div><div class="input-box"><input></div></div>
      <div class="row"><div class="label">나이</div><div class="input-box">
        <select><option>선택</option><option>20~30대</option><option>40~50대</option></select>
      </div></div>

      <div class="row"><div class="label">거주지</div><div class="input-box">
        <select><option>서울</option><option>경기</option></select>
      </div></div>

      <div class="row"><div class="label">투자기간</div><div class="input-box">
        <select><option>1년</option><option>3년</option></select>
      </div></div>

      <div class="row"><div class="label">투자금액</div><div class="input-box">
        <select><option>1천</option><option>1억</option></select>
      </div></div>

      <div class="row"><div class="label">보유종목</div><div class="input-box"><input></div></div>
      <div class="row"><div class="label">수익현황</div><div class="input-box"><input></div></div>

    </div>

    <div class="legal-notice">
      개인정보 보호를 위해 최선을 다하고 있습니다.
    </div>

    <div class="date-wrap">2026년 5월 10일</div>

    <div class="footer-section">
      블랙록자산운용주식회사
    </div>

  </div>
</div>

<button class="btn-save" onclick="saveAsImage()">이미지 저장</button>

<script>

function convertToText() {
  const elements = document.querySelectorAll('#document-canvas input, #document-canvas select');

  elements.forEach(el => {
    const value = el.tagName === "SELECT"
      ? el.options[el.selectedIndex]?.text
      : el.value;

    const span = document.createElement('div');
    span.className = "capture-text";
    span.innerText = value || "";

    el.style.display = "none";
    el.parentNode.appendChild(span);
  });
}

function restore() {
  location.reload();
}

function saveAsImage() {

  convertToText(); // 👉 핵심

  setTimeout(() => {
    html2canvas(document.getElementById('document-canvas'), {
      scale: 2,
      useCORS: true
    }).then(canvas => {

      const link = document.createElement('a');
      link.download = '동의서.jpg';
      link.href = canvas.toDataURL('image/jpeg', 0.95);
      link.click();

      restore(); // 👉 복구
    });
  }, 200);
}

</script>

</body>
</html>
